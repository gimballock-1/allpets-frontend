# allpets-frontend — local dev stack (issue 7.10)
#
# Marketing content is FILE-BASED (typed TS + MDX in this repo), so the site renders
# with NO backend at all — for pure content work just run `pnpm dev` (no compose).
# This stack is only needed to exercise the same-origin /api/* proxy route handlers
# (/api/contact, Epic 8; /api/reviews, Epic 10), which reach the Spring backend + its
# Postgres `appdb`.
#
# THREE TIERS (see README "Local full-stack dev"):
#   1. content only ............ pnpm dev                      (no compose)
#   2. + proxy routes .......... docker compose up   → db + api ; then host `pnpm dev`
#                                (set API_BASE=http://localhost:8080 in .env.local)
#   3. fully containerized ..... docker compose --profile web up
#      optional object store ... docker compose --profile minio up
#
# CROSS-REPO COUPLING (acceptance): the canonical backend compose is OWNED BY Epic 20
# (allpets-backend). This file MIRRORS that topology — postgres:16.4 on :5432
# (appdb/app_svc), Spring on :8080, MinIO on :9000/:9001 — taken from the backend k8s
# manifests (deploy/k8s/database/* + deploy/k8s/api/*). The two repos MUST agree on
# these host ports; do NOT run both composes at once (they fight for :5432/:8080).
#
# Teardown: `docker compose down -v` removes the named volumes below — no orphans.

name: allpets

services:
  # --- Postgres (mirrors allpets-backend/deploy/k8s/database) ----------------
  db:
    image: postgres:16.4
    environment:
      # app_svc is the local superuser owning appdb (the k8s init Job creates the
      # same role/db topology in prod). One password: Spring connects as app_svc.
      POSTGRES_DB: appdb
      POSTGRES_USER: app_svc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-allpets}
    ports:
      - "5432:5432"
    volumes:
      - allpets-pgdata:/var/lib/postgresql/data
      # pre-create the trusted extensions the backend's init Job ensures, so
      # Spring/Flyway migrations behave the same locally.
      - ./deploy/dev/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_svc -d appdb -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 12

  # --- Spring backend (image owned by Epic 20) -------------------------------
  api:
    # Default: pull the Epic 20 image from GHCR. The package may be PRIVATE — run
    # `docker login ghcr.io` first (or set ALLPETS_API_IMAGE to a tag you can pull).
    # NO-REGISTRY ALTERNATIVES (pick one, see README):
    #   • uncomment `build:` below if you have a sibling ../allpets-backend checkout, or
    #   • skip this service and run the backend via `./gradlew bootRun` in that repo
    #     (then `docker compose up db` for Postgres only).
    image: ${ALLPETS_API_IMAGE:-ghcr.io/gimballock-1/allpets-api:main}
    # build:
    #   context: ../allpets-backend
    #   dockerfile: deploy/Dockerfile.api
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/appdb
      SPRING_DATASOURCE_USERNAME: app_svc
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-allpets}
      # let the browser (Next.js on :3000) through Spring's CORS in dev.
      ALLPETS_CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    # No healthcheck here on purpose: this image is foreign-owned (Epic 20) and its
    # actuator readiness endpoint + base tooling (wget/curl) aren't ours to assume.
    # `web` depends on it via `service_started`; nothing gates on `service_healthy`.

  # --- MinIO (optional; future pet media, Epic 20) ---------------------------
  minio:
    # Intentionally floating: optional, profile-gated, dev-only tooling (pet media is
    # not in phase 1). MinIO ships only `latest` + date-stamped `RELEASE.*` tags; we
    # don't pin a fabricated timestamp here. Pin a real RELEASE tag if you need
    # reproducibility for media work.
    image: minio/minio
    profiles: ["minio"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console
    volumes:
      - allpets-minio:/data

  # --- Next.js dev server (optional; default is host `pnpm dev`) --------------
  web:
    image: node:24-alpine
    profiles: ["web"]
    working_dir: /app
    # corepack provides the pinned pnpm; node_modules/.next are named volumes so the
    # container's install never clobbers the host's (and survives across runs).
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm dev"
    environment:
      API_BASE: http://api:8080                 # in-compose service DNS (not localhost)
      NEXT_PUBLIC_CALCOM_URL: ${NEXT_PUBLIC_CALCOM_URL:-https://book.allpets.skpodduturi.dev}
      NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${NEXT_PUBLIC_PLAUSIBLE_DOMAIN:-allpets.skpodduturi.dev}
      NEXT_PUBLIC_PLAUSIBLE_SCRIPT_URL: ${NEXT_PUBLIC_PLAUSIBLE_SCRIPT_URL:-https://analytics.allpets.skpodduturi.dev/js/script.js}
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"                 # reliable HMR over a bind mount (macOS/Windows)
    volumes:
      - .:/app
      - web-node-modules:/app/node_modules
      - web-next:/app/.next
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  allpets-pgdata:
  allpets-minio:
  web-node-modules:
  web-next:
